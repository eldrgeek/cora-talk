<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill — NBRPA Committee Team</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0d0b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e8e4de;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #f5f0e8;
    }
    .page-header .subtitle {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: #8a7f6e;
      letter-spacing: 0.02em;
    }

    .panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 380px;
    }
    .panel.visible { display: flex; }

    /* Start button */
    .btn-start {
      background: #c4a35a;
      color: #0f0d0b;
      border: none;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.9em 3.2em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-start:hover { background: #d4b36a; }
    .btn-start:active { transform: scale(0.97); }

    /* Connecting state */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #3a3228;
      border-top-color: #c4a35a;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Active state - orb */
    .orb-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #d4b36a, #7a5a20);
      box-shadow: 0 0 0 0 rgba(196,163,90,0.4);
      transition: box-shadow 0.3s;
    }

    /* Listening — slow breathing */
    .orb.listening {
      animation: breathe 3.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0  6px rgba(196,163,90,0.12); }
      50%       { transform: scale(1.05); box-shadow: 0 0 0 18px rgba(196,163,90,0.06); }
    }

    /* Speaking — outward pulse rings */
    .orb.speaking {
      animation: pulse-speak 1.1s ease-in-out infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { box-shadow: 0 0 0  0px rgba(196,163,90,0.55); }
      50%       { box-shadow: 0 0 0 24px rgba(196,163,90,0.0);  }
    }

    /* Thinking — slow shimmer brightness */
    .orb.thinking {
      animation: think-shimmer 1.8s ease-in-out infinite;
    }
    @keyframes think-shimmer {
      0%, 100% { filter: brightness(0.85) saturate(0.8); box-shadow: 0 0 12px 2px rgba(196,163,90,0.2); }
      50%       { filter: brightness(1.25) saturate(1.2); box-shadow: 0 0 24px 4px rgba(196,163,90,0.5); }
    }

    /* Audio level bars */
    .level-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 28px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .level-bars.visible { opacity: 1; }
    .level-bars .bar {
      width: 5px;
      border-radius: 3px;
      background: #c4a35a;
      min-height: 3px;
      transition: height 0.08s ease-out;
    }

    /* Status chip */
    .status-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0.35em 0.85em;
      border-radius: 20px;
      background: #1e1a16;
      border: 1px solid #2a2520;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.listening { background: #c4a35a; animation: dot-breathe 3.5s ease-in-out infinite; }
    .status-dot.speaking  { background: #e8c878; animation: dot-pulse 1.1s ease-in-out infinite; }
    .status-dot.thinking  { background: #8a7f6e; animation: dot-think 1.8s ease-in-out infinite; }
    @keyframes dot-breathe {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.8); }
    }
    @keyframes dot-think {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    .mode-label {
      font-size: 0.82rem;
      color: #8a7f6e;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .btn-end {
      background: transparent;
      color: #6a5f50;
      border: 1px solid #3a3228;
      border-radius: 8px;
      font-size: 0.9rem;
      padding: 0.6em 2em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 0.5rem;
    }
    .btn-end:hover { border-color: #8a7f6e; color: #c8bcaa; }

    /* Error state */
    .error-msg {
      color: #c06060;
      font-size: 0.9rem;
      text-align: center;
    }
    .btn-retry {
      background: #2a2520;
      color: #c8bcaa;
      border: 1px solid #3a3228;
      border-radius: 8px;
      font-size: 0.9rem;
      padding: 0.6em 2em;
      cursor: pointer;
    }
    .btn-retry:hover { background: #3a3228; }

    .hint {
      font-size: 0.78rem;
      color: #3a3228;
      text-align: center;
    }

    :root { --tx-accent: #c4a35a; --kb-accent: #3a7a5a; }

    /* ── Transcript panel ─────────────────────────────── */
    .tx-trigger {
      position: fixed; bottom: 1rem; right: 1rem;
      background: transparent; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #444; font-size: 0.72rem; letter-spacing: 0.05em; padding: 0.3em 0.75em;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; z-index: 100;
      font-family: inherit;
    }
    .tx-trigger:hover { border-color: #555; color: #888; }
    .tx-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .tx-overlay.open { opacity: 1; pointer-events: all; }
    .tx-panel {
      background: #0e0e0e; border: 1px solid #252525; border-radius: 12px;
      width: min(92vw, 700px); max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .tx-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.25rem; border-bottom: 1px solid #1c1c1c; flex-shrink: 0;
    }
    .tx-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .tx-title { font-size: 0.95rem; font-weight: 600; color: #d8d8d8; letter-spacing: 0.02em; }
    .tx-back {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 0.8rem; padding: 0; letter-spacing: 0.02em;
    }
    .tx-back:hover { color: #aaa; }
    .tx-close {
      background: none; border: none; color: #484848; font-size: 1.25rem;
      line-height: 1; cursor: pointer; padding: 0 0.1rem; transition: color 0.15s;
    }
    .tx-close:hover { color: #ccc; }
    .tx-body { flex: 1; overflow-y: auto; }
    .tx-conv-item {
      padding: 0.7rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid #181818; transition: background 0.1s;
    }
    .tx-conv-item:hover { background: #141414; }
    .tx-conv-item:last-child { border-bottom: none; }
    .tx-conv-date { font-size: 0.82rem; color: #888; }
    .tx-conv-meta { font-size: 0.74rem; color: #4a4a4a; margin-top: 0.15rem; }
    .tx-edited-badge {
      display: inline-block; font-size: 0.62rem; letter-spacing: 0.07em;
      text-transform: uppercase; background: #1a1a1a; border: 1px solid #2e2e2e;
      border-radius: 3px; padding: 0.1em 0.4em; color: var(--tx-accent); margin-left: 0.5rem;
    }
    .tx-transcript { padding: 0.75rem 1.25rem 1.25rem; display: flex; flex-direction: column; gap: 0.875rem; }
    .tx-turn { display: flex; flex-direction: column; gap: 0.2rem; }
    .tx-turn-role { font-size: 0.67rem; letter-spacing: 0.08em; text-transform: uppercase; color: #4a4a4a; font-weight: 600; }
    .tx-turn-role.agent { color: var(--tx-accent); }
    .tx-turn-text { font-size: 0.88rem; color: #c8c8c8; line-height: 1.55; white-space: pre-wrap; }
    .tx-edit-bar {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      padding: 0.7rem 1.25rem; border-top: 1px solid #1c1c1c; flex-shrink: 0;
    }
    .tx-btn {
      padding: 0.38em 0.95em; border-radius: 5px; font-size: 0.8rem;
      cursor: pointer; transition: background 0.15s, border-color 0.15s; letter-spacing: 0.02em; font-family: inherit;
    }
    .tx-btn-primary { background: var(--tx-accent); color: #000; border: none; font-weight: 600; }
    .tx-btn-primary:hover { filter: brightness(1.1); }
    .tx-btn-secondary { background: transparent; color: #777; border: 1px solid #2e2e2e; }
    .tx-btn-secondary:hover { border-color: #555; color: #bbb; }
    .tx-btn-danger { background: transparent; color: #7a3838; border: 1px solid #3e1e1e; }
    .tx-btn-danger:hover { border-color: #8a4040; color: #c06060; }
    .tx-edit-saved { font-size: 0.76rem; color: #5a9a5a; flex: 1; text-align: right; }
    .tx-textarea {
      width: 100%; background: #090909; border: 1px solid #252525; border-radius: 6px;
      color: #c8c8c8; font-family: inherit; font-size: 0.86rem; line-height: 1.55;
      padding: 0.75rem 1rem; resize: vertical; min-height: 220px; box-sizing: border-box;
    }
    .tx-textarea:focus { outline: none; border-color: #3a3a3a; }
    .tx-ta-wrap { padding: 0.75rem 1.25rem; }
    .tx-empty { text-align: center; color: #4a4a4a; font-size: 0.86rem; padding: 2.5rem 1.5rem; line-height: 1.6; }
    .tx-loading { text-align: center; color: #4a4a4a; font-size: 0.84rem; padding: 2.5rem 1.5rem; }

    /* ── Canon (KB) panel trigger ────────────────────────── */
    .kb-trigger {
      position: fixed; bottom: 1rem; left: 1rem;
      background: transparent; border: 1px solid #1a2a1a; border-radius: 6px;
      color: #2a4a2a; font-size: 0.72rem; letter-spacing: 0.05em; padding: 0.3em 0.75em;
      cursor: pointer; transition: border-color 0.15s, color 0.15s; z-index: 100;
      font-family: inherit;
    }
    .kb-trigger:hover { border-color: #3a6a3a; color: #5a9a5a; }

    .kb-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .kb-overlay.open { opacity: 1; pointer-events: all; }
    .kb-panel {
      background: #080e08; border: 1px solid #1a2a1a; border-radius: 12px;
      width: min(92vw, 700px); max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .kb-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.25rem; border-bottom: 1px solid #151e15; flex-shrink: 0;
    }
    .kb-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .kb-title { font-size: 0.95rem; font-weight: 600; color: #c8d8c8; letter-spacing: 0.02em; }
    .kb-back {
      background: none; border: none; color: #3a6a3a; cursor: pointer;
      font-size: 0.8rem; padding: 0; letter-spacing: 0.02em;
    }
    .kb-back:hover { color: #7aaa7a; }
    .kb-close {
      background: none; border: none; color: #384038; font-size: 1.25rem;
      line-height: 1; cursor: pointer; padding: 0 0.1rem; transition: color 0.15s;
    }
    .kb-close:hover { color: #aacaaa; }
    .kb-body { flex: 1; overflow-y: auto; }

    .kb-doc-item {
      padding: 0.75rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid #101810; transition: background 0.1s;
    }
    .kb-doc-item:hover { background: #0c140c; }
    .kb-doc-item:last-child { border-bottom: none; }
    .kb-doc-name { font-size: 0.88rem; color: #b8c8b8; }
    .kb-doc-meta { font-size: 0.74rem; color: #2a4a2a; margin-top: 0.15rem; }

    .kb-add-btn {
      display: block; width: calc(100% - 2.5rem); margin: 1rem 1.25rem;
      background: #0e1e0e; border: 1px solid #1e3e1e; border-radius: 7px;
      color: #3a7a3a; font-size: 0.88rem; padding: 0.65em; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; text-align: center; font-family: inherit;
    }
    .kb-add-btn:hover { background: #141e14; border-color: #3a6a3a; color: #6aaa6a; }

    .kb-empty { text-align: center; color: #2a4a2a; font-size: 0.86rem; padding: 2.5rem 1.5rem; line-height: 1.6; }
    .kb-loading { text-align: center; color: #2a4a2a; font-size: 0.84rem; padding: 2.5rem 1.5rem; }
    .kb-error { color: #7a4040; font-size: 0.84rem; padding: 1.25rem; text-align: center; }

    .kb-form { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .kb-tabs { display: flex; gap: 0.5rem; margin-bottom: 0.25rem; }
    .kb-tab {
      padding: 0.35em 1em; border-radius: 5px; font-size: 0.8rem; cursor: pointer;
      background: transparent; border: 1px solid #1e3e1e; color: #3a6a3a; font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .kb-tab.active { background: #1a3a1a; border-color: #3a7a3a; color: #8aca8a; }
    .kb-tab:hover:not(.active) { border-color: #2a4a2a; color: #5a8a5a; }
    .kb-label { font-size: 0.78rem; color: #3a6a3a; letter-spacing: 0.04em; margin-bottom: -0.4rem; }
    .kb-input {
      width: 100%; background: #050e05; border: 1px solid #1e3e1e; border-radius: 6px;
      color: #b8c8b8; font-family: inherit; font-size: 0.86rem; padding: 0.6rem 0.9rem;
      box-sizing: border-box; appearance: none;
    }
    .kb-input:focus { outline: none; border-color: #2a5a2a; }
    .kb-input::placeholder { color: #1e3e1e; }
    .kb-file-label {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      background: #050e05; border: 1px dashed #1e3e1e; border-radius: 6px;
      color: #3a6a3a; font-size: 0.86rem; padding: 1.2rem 0.9rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .kb-file-label:hover { border-color: #3a6a3a; color: #6aaa6a; }
    .kb-file-label input { display: none; }
    .kb-file-chosen { font-size: 0.82rem; color: #7aaa7a; }
    .kb-submit {
      background: #1a3a1a; border: 1px solid #3a7a3a; border-radius: 7px;
      color: #8aca8a; font-size: 0.9rem; font-weight: 600; padding: 0.65em;
      cursor: pointer; transition: background 0.15s, border-color 0.15s; font-family: inherit;
    }
    .kb-submit:hover:not(:disabled) { background: #254a25; border-color: #5aaa5a; }
    .kb-submit:disabled { opacity: 0.5; cursor: default; }
    .kb-feedback { font-size: 0.82rem; text-align: center; min-height: 1.2em; }
    .kb-feedback.ok { color: #5a9a5a; }
    .kb-feedback.err { color: #9a4a4a; }

    /* ── Mode toggle ──────────────────────────────────────── */
    .mode-toggle {
      display: flex; gap: 0.4rem;
    }
    .mode-btn {
      padding: 0.35em 1.1em; border-radius: 6px; font-size: 0.8rem;
      cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
      background: transparent; border: 1px solid #3a3228; color: #6a5f50;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .mode-btn.active { background: #2a2520; border-color: #c4a35a; color: #c4a35a; }
    .mode-btn:hover:not(.active) { border-color: #5a4e38; color: #9a8a70; }

    /* ── Text chat state ──────────────────────────────────── */
    .chat-log {
      width: 100%; max-width: 380px; min-height: 220px; max-height: 340px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem;
      padding: 0.5rem 0;
    }
    .chat-message { display: flex; flex-direction: column; gap: 0.15rem; max-width: 100%; }
    .chat-speaker { font-size: 0.67rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: #5a4e38; }
    .chat-message--ai .chat-speaker { color: #c4a35a; }
    .chat-text { font-size: 0.88rem; color: #c8bcaa; line-height: 1.55; white-space: pre-wrap; margin: 0; }
    .chat-input-row {
      display: flex; gap: 0.5rem; width: 100%; max-width: 380px;
    }
    .chat-input {
      flex: 1; background: #1a1612; border: 1px solid #3a3228; border-radius: 7px;
      color: #e8e4de; font-family: inherit; font-size: 0.9rem; padding: 0.55rem 0.85rem;
      outline: none;
    }
    .chat-input:focus { border-color: #c4a35a; }
    .chat-input::placeholder { color: #3a3228; }
    .chat-send {
      background: #c4a35a; color: #0f0d0b; border: none; border-radius: 7px;
      font-size: 0.88rem; font-weight: 700; padding: 0.55rem 1.1rem;
      cursor: pointer; transition: background 0.12s; flex-shrink: 0;
    }
    .chat-send:hover { background: #d4b36a; }
    .chat-send:disabled { opacity: 0.45; cursor: default; }
    .chat-thinking {
      font-size: 0.78rem; color: #5a4e38; letter-spacing: 0.04em; min-height: 1.2em;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Bill</h1>
    <p class="subtitle">NBRPA Member Services — Committee Team</p>
  </div>

  <!-- Start state: one click to connect -->
  <div id="start-state" class="panel visible">
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-voice">Voice</button>
      <button class="mode-btn" id="mode-text">Text</button>
    </div>
    <button class="btn-start" id="btn-start">Talk to Bill</button>
    <p class="hint" id="start-hint">Microphone access required.</p>
  </div>

  <!-- Connecting state -->
  <div id="connecting-state" class="panel">
    <div class="spinner"></div>
    <p style="color:#6a5f50;font-size:0.9rem;letter-spacing:0.04em;">Connecting&hellip;</p>
  </div>

  <!-- Active conversation state -->
  <div id="active-state" class="panel">
    <div class="orb-wrap">
      <div class="orb listening" id="orb"></div>
    </div>

    <!-- Audio level bars (shown during listening) -->
    <div class="level-bars" id="level-bars">
      <div class="bar" id="bar0"></div>
      <div class="bar" id="bar1"></div>
      <div class="bar" id="bar2"></div>
      <div class="bar" id="bar3"></div>
      <div class="bar" id="bar4"></div>
    </div>

    <!-- Status chip: dot + label -->
    <div class="status-chip">
      <div class="status-dot listening" id="status-dot"></div>
      <span class="mode-label" id="mode-label">Listening</span>
    </div>

    <button class="btn-end" id="btn-end">End Conversation</button>
  </div>

  <!-- Error state -->
  <div id="error-state" class="panel">
    <p class="error-msg" id="error-msg">Something went wrong.</p>
    <button class="btn-retry" id="btn-retry">Try Again</button>
  </div>

  <!-- Text chat state -->
  <div id="text-active-state" class="panel">
    <div class="chat-log" id="chat-log"></div>
    <p class="chat-thinking" id="chat-thinking"></p>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="Type a message…" autocomplete="off">
      <button class="chat-send" id="chat-send">Send</button>
    </div>
    <button class="btn-end" id="btn-text-end">End Conversation</button>
  </div>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@elevenlabs/client@latest';

    const AGENT_ID = 'agent_2401ks53q6t8e2drt1h7va3f2c52';

    let conversation = null;
    let textConv = null;
    let textMode = false;
    let rafId = null;
    let currentMode = 'listening';

    const bars = [0,1,2,3,4].map(i => document.getElementById('bar' + i));
    const levelBars = document.getElementById('level-bars');

    function show(id) {
      const ids = ['start-state', 'connecting-state', 'active-state', 'error-state', 'text-active-state'];
      ids.forEach(sid => {
        document.getElementById(sid).classList.toggle('visible', sid === id);
      });
    }

    function setMode(mode) {
      currentMode = mode;
      const orb = document.getElementById('orb');
      const label = document.getElementById('mode-label');
      const dot = document.getElementById('status-dot');

      orb.className = 'orb ' + mode;
      dot.className = 'status-dot ' + mode;

      if (mode === 'speaking') {
        label.textContent = 'Bill is speaking';
        levelBars.classList.remove('visible');
      } else if (mode === 'thinking') {
        label.textContent = 'Thinking…';
        levelBars.classList.remove('visible');
      } else {
        label.textContent = 'Listening';
        levelBars.classList.add('visible');
      }
    }

    // Animate audio level bars using mic input volume
    function animateBars() {
      if (!conversation) return;
      try {
        const vol = conversation.getInputVolume?.() ?? 0;
        // vol is 0–1; map to bar heights with some randomisation for naturalness
        bars.forEach((bar, i) => {
          const offset = (Math.sin(Date.now() / 120 + i * 1.3) * 0.15);
          const h = Math.max(3, Math.round((vol + offset) * 28));
          bar.style.height = h + 'px';
        });
      } catch (_) {}
      rafId = requestAnimationFrame(animateBars);
    }

    function stopBars() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      bars.forEach(bar => { bar.style.height = '3px'; });
    }

    async function startConversation() {
      show('connecting-state');

      try {
        conversation = await Conversation.startSession({
          agentId: AGENT_ID,
          onConnect: () => {
            show('active-state');
            setMode('listening');
            animateBars();
          },
          onDisconnect: () => {
            stopBars();
            conversation = null;
            show('start-state');
          },
          onError: (err) => {
            stopBars();
            document.getElementById('error-msg').textContent = String(err);
            conversation = null;
            show('error-state');
          },
          onModeChange: ({ mode }) => {
            setMode(mode === 'speaking' ? 'speaking' : mode === 'thinking' || mode === 'processing' ? 'thinking' : 'listening');
          },
        });
      } catch (err) {
        stopBars();
        document.getElementById('error-msg').textContent = String(err);
        conversation = null;
        show('error-state');
      }
    }

    async function endConversation() {
      stopBars();
      if (conversation) {
        try { await conversation.endSession(); } catch (_) {}
        conversation = null;
      }
      show('start-state');
    }

    async function startTextConversation() {
      show('connecting-state');
      document.getElementById('chat-log').innerHTML = '';
      document.getElementById('chat-thinking').textContent = '';
      try {
        textConv = await Conversation.startSession({
          agentId: AGENT_ID,
          textOnly: true,
          onConnect: () => { show('text-active-state'); },
          onMessage: ({ source, message }) => {
            document.getElementById('chat-thinking').textContent = '';
            if (source === 'ai') appendChatMsg('Bill', message, 'ai');
          },
          onModeChange: ({ mode }) => {
            document.getElementById('chat-thinking').textContent =
              (mode === 'thinking' || mode === 'processing') ? 'Bill is thinking…' :
              mode === 'speaking' ? 'Bill is responding…' : '';
          },
          onDisconnect: () => { textConv = null; show('start-state'); },
          onError: (err) => {
            textConv = null;
            document.getElementById('error-msg').textContent = String(err);
            show('error-state');
          },
        });
      } catch (err) {
        document.getElementById('error-msg').textContent = String(err);
        show('error-state');
      }
    }

    function appendChatMsg(speaker, text, role) {
      var log = document.getElementById('chat-log');
      var div = document.createElement('div');
      div.className = 'chat-message chat-message--' + role;
      div.innerHTML = '<span class="chat-speaker">' + speaker + '</span>'
        + '<p class="chat-text">' + String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    document.getElementById('mode-voice').addEventListener('click', () => {
      textMode = false;
      document.getElementById('mode-voice').classList.add('active');
      document.getElementById('mode-text').classList.remove('active');
      document.getElementById('btn-start').textContent = 'Talk to Bill';
      document.getElementById('start-hint').textContent = 'Microphone access required.';
    });
    document.getElementById('mode-text').addEventListener('click', () => {
      textMode = true;
      document.getElementById('mode-text').classList.add('active');
      document.getElementById('mode-voice').classList.remove('active');
      document.getElementById('btn-start').textContent = 'Start Text Chat';
      document.getElementById('start-hint').textContent = 'No microphone needed for text mode.';
    });
    document.getElementById('btn-start').addEventListener('click', () => {
      if (textMode) startTextConversation(); else startConversation();
    });
    document.getElementById('chat-send').addEventListener('click', () => {
      var input = document.getElementById('chat-input');
      var text = input.value.trim();
      if (!text || !textConv) return;
      appendChatMsg('You', text, 'user');
      textConv.sendUserMessage(text);
      document.getElementById('chat-thinking').textContent = '';
      input.value = '';
    });
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('chat-send').click(); }
    });
    document.getElementById('btn-text-end').addEventListener('click', async () => {
      if (textConv) { try { await textConv.endSession(); } catch(_) {} textConv = null; }
      show('start-state');
    });
    document.getElementById('btn-end').addEventListener('click', endConversation);
    document.getElementById('btn-retry').addEventListener('click', () => {
      if (textMode) startTextConversation(); else startConversation();
    });

  </script>

<!-- Canon (KB upload) panel -->
<button class="kb-trigger" id="kb-trigger">Canon</button>
<div class="kb-overlay" id="kb-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="kb-panel">
    <div class="kb-header">
      <div class="kb-header-left">
        <button class="kb-back" id="kb-back" hidden>← Back</button>
        <span class="kb-title" id="kb-title">Bill's Knowledge</span>
      </div>
      <button class="kb-close" id="kb-close" aria-label="Close">&times;</button>
    </div>
    <div class="kb-body" id="kb-body"></div>
  </div>
</div>

<script>
(function() {
  var KB_LIST  = '/.netlify/functions/kb-list';
  var KB_UPLOAD = '/.netlify/functions/kb-upload';

  var overlay  = document.getElementById('kb-overlay');
  var kbBody   = document.getElementById('kb-body');
  var kbTitle  = document.getElementById('kb-title');
  var backBtn  = document.getElementById('kb-back');

  var activeTab = 'url';

  function openOverlay() {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    showList();
  }

  function closeOverlay() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showBackBtn(visible) { backBtn.hidden = !visible; }

  async function showList() {
    kbTitle.textContent = "Bill's Knowledge";
    showBackBtn(false);
    kbBody.innerHTML = '<div class="kb-loading">Loading…</div>';

    var data;
    try {
      var r = await fetch(KB_LIST);
      data = await r.json();
    } catch(e) {
      kbBody.innerHTML = '<div class="kb-error">Could not load documents.<br><small>' + escHtml(e.message) + '</small></div>';
      return;
    }

    var docs = data.documents || [];
    kbBody.innerHTML = '';

    var addBtn = document.createElement('button');
    addBtn.className = 'kb-add-btn';
    addBtn.textContent = '+ Add document or URL';
    addBtn.addEventListener('click', showUpload);
    kbBody.appendChild(addBtn);

    if (!docs.length) {
      var empty = document.createElement('div');
      empty.className = 'kb-empty';
      empty.textContent = 'No documents in canon yet. Add one above.';
      kbBody.appendChild(empty);
      return;
    }

    docs.forEach(function(doc) {
      var div = document.createElement('div');
      div.className = 'kb-doc-item';
      div.innerHTML = '<div class="kb-doc-name">' + escHtml(doc.name || doc.id) + '</div>'
        + '<div class="kb-doc-meta">' + escHtml(doc.type || 'document') + (doc.usage_mode ? ' \xb7 ' + escHtml(doc.usage_mode) : '') + '</div>';
      kbBody.appendChild(div);
    });
  }

  function showUpload() {
    kbTitle.textContent = 'Add to Canon';
    showBackBtn(true);
    renderUploadForm();
  }

  function renderUploadForm() {
    kbBody.innerHTML = '';
    var form = document.createElement('div');
    form.className = 'kb-form';

    var tabs = document.createElement('div');
    tabs.className = 'kb-tabs';
    ['url', 'file'].forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'kb-tab' + (activeTab === t ? ' active' : '');
      btn.textContent = t === 'url' ? 'URL / Google Doc' : 'File';
      btn.addEventListener('click', function() { activeTab = t; renderUploadForm(); });
      tabs.appendChild(btn);
    });
    form.appendChild(tabs);

    var feedback = document.createElement('div');
    feedback.className = 'kb-feedback';

    if (activeTab === 'url') {
      var urlLabel = document.createElement('div');
      urlLabel.className = 'kb-label';
      urlLabel.textContent = 'URL';
      form.appendChild(urlLabel);

      var urlInput = document.createElement('input');
      urlInput.className = 'kb-input';
      urlInput.type = 'url';
      urlInput.placeholder = 'https://docs.google.com/… or any public URL';
      form.appendChild(urlInput);

      var nameLabel = document.createElement('div');
      nameLabel.className = 'kb-label';
      nameLabel.textContent = 'Name (optional)';
      form.appendChild(nameLabel);

      var nameInput = document.createElement('input');
      nameInput.className = 'kb-input';
      nameInput.type = 'text';
      nameInput.placeholder = 'Document name';
      form.appendChild(nameInput);

      var submit = document.createElement('button');
      submit.className = 'kb-submit';
      submit.textContent = 'Add to Canon';
      submit.addEventListener('click', function() {
        var url = urlInput.value.trim();
        if (!url) { feedback.textContent = 'URL required.'; feedback.className = 'kb-feedback err'; return; }
        submit.disabled = true; submit.textContent = 'Uploading…'; feedback.textContent = '';
        fetch(KB_UPLOAD, { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'url', url: url, name: nameInput.value.trim() || undefined }) })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
        .then(function(res) {
          if (res.ok) { feedback.textContent = '✓ Added: ' + (res.d.name || 'document'); feedback.className = 'kb-feedback ok'; submit.textContent = 'Add to Canon'; submit.disabled = false; urlInput.value = ''; nameInput.value = ''; }
          else { feedback.textContent = res.d.error || 'Upload failed.'; feedback.className = 'kb-feedback err'; submit.textContent = 'Add to Canon'; submit.disabled = false; }
        })
        .catch(function(e) { feedback.textContent = 'Network error: ' + e.message; feedback.className = 'kb-feedback err'; submit.textContent = 'Add to Canon'; submit.disabled = false; });
      });
      form.appendChild(submit);

    } else {
      var fileLabel = document.createElement('label');
      fileLabel.className = 'kb-file-label';
      var fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.accept = '.pdf,.docx,.txt,.md';
      var fileText = document.createElement('span');
      fileText.textContent = 'Choose file (pdf, docx, txt, md)';
      var fileChosen = document.createElement('span');
      fileChosen.className = 'kb-file-chosen';
      fileInput.addEventListener('change', function() { fileChosen.textContent = fileInput.files[0] ? fileInput.files[0].name : ''; });
      fileLabel.appendChild(fileInput); fileLabel.appendChild(fileText);
      form.appendChild(fileLabel); form.appendChild(fileChosen);

      var fNameLabel = document.createElement('div');
      fNameLabel.className = 'kb-label'; fNameLabel.textContent = 'Name (optional)';
      form.appendChild(fNameLabel);
      var fNameInput = document.createElement('input');
      fNameInput.className = 'kb-input'; fNameInput.type = 'text'; fNameInput.placeholder = 'Document name';
      form.appendChild(fNameInput);

      var fSubmit = document.createElement('button');
      fSubmit.className = 'kb-submit'; fSubmit.textContent = 'Add to Canon';
      fSubmit.addEventListener('click', function() {
        var file = fileInput.files[0];
        if (!file) { feedback.textContent = 'Choose a file first.'; feedback.className = 'kb-feedback err'; return; }
        fSubmit.disabled = true; fSubmit.textContent = 'Uploading…'; feedback.textContent = '';
        var ext = file.name.split('.').pop().toLowerCase();
        var docName = fNameInput.value.trim() || file.name;
        if (ext === 'txt' || ext === 'md') {
          var reader = new FileReader();
          reader.onload = function(e) {
            fetch(KB_UPLOAD, { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'text', text: e.target.result, name: docName }) })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
            .then(handleResult(fSubmit, feedback, docName)).catch(handleError(fSubmit, feedback));
          };
          reader.readAsText(file);
        } else {
          var binReader = new FileReader();
          binReader.onload = function(e) {
            var b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(e.target.result)));
            fetch(KB_UPLOAD, { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'file_base64', content_base64: b64, filename: file.name, mime_type: file.type, name: docName }) })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
            .then(handleResult(fSubmit, feedback, docName)).catch(handleError(fSubmit, feedback));
          };
          binReader.readAsArrayBuffer(file);
        }
      });
      form.appendChild(fSubmit);
    }

    form.appendChild(feedback);
    kbBody.appendChild(form);
  }

  function handleResult(btn, fb, name) {
    return function(res) {
      if (res.ok) { fb.textContent = '✓ Added: ' + (res.d.name || name); fb.className = 'kb-feedback ok'; }
      else { fb.textContent = res.d.error || 'Upload failed.'; fb.className = 'kb-feedback err'; }
      btn.textContent = 'Add to Canon'; btn.disabled = false;
    };
  }
  function handleError(btn, fb) {
    return function(e) { fb.textContent = 'Network error: ' + e.message; fb.className = 'kb-feedback err'; btn.textContent = 'Add to Canon'; btn.disabled = false; };
  }

  document.getElementById('kb-trigger').addEventListener('click', openOverlay);
  document.getElementById('kb-close').addEventListener('click', closeOverlay);
  backBtn.addEventListener('click', showList);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay(); });
})();
</script>

<!-- Transcript panel -->
<button class="tx-trigger" id="tx-trigger">History</button>
<div class="tx-overlay" id="tx-overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="tx-panel">
    <div class="tx-header">
      <div class="tx-header-left">
        <button class="tx-back" id="tx-back" hidden>← Back</button>
        <span class="tx-title" id="tx-title">Conversation History</span>
      </div>
      <button class="tx-close" id="tx-close" aria-label="Close">&times;</button>
    </div>
    <div class="tx-body" id="tx-body"></div>
    <div class="tx-edit-bar" id="tx-edit-bar" hidden>
      <button class="tx-btn tx-btn-secondary" id="tx-btn-edit">Edit</button>
      <button class="tx-btn tx-btn-primary" id="tx-btn-save" hidden>Save</button>
      <button class="tx-btn tx-btn-secondary" id="tx-btn-cancel" hidden>Cancel</button>
      <button class="tx-btn tx-btn-secondary" id="tx-btn-orig" hidden>Show original</button>
      <button class="tx-btn tx-btn-danger" id="tx-btn-discard" hidden>Discard edits</button>
      <span class="tx-edit-saved" id="tx-edit-saved"></span>
    </div>
  </div>
</div>

<script>
(function() {
  var TX_AGENT_ID = 'agent_2401ks53q6t8e2drt1h7va3f2c52';
  var TX_AGENT_NAME = 'Bill';
  var PROXY = '/.netlify/functions/el-proxy';
  var STORE_PFX = 'el-tx-edit:';

  var overlay = document.getElementById('tx-overlay');
  var txBody = document.getElementById('tx-body');
  var txTitle = document.getElementById('tx-title');
  var backBtn = document.getElementById('tx-back');
  var editBar = document.getElementById('tx-edit-bar');
  var btnEdit = document.getElementById('tx-btn-edit');
  var btnSave = document.getElementById('tx-btn-save');
  var btnCancel = document.getElementById('tx-btn-cancel');
  var btnOrig = document.getElementById('tx-btn-orig');
  var btnDiscard = document.getElementById('tx-btn-discard');
  var savedMsg = document.getElementById('tx-edit-saved');

  var currentConv = null;
  var editMode = false;
  var showOrig = false;

  function ekey(id) { return STORE_PFX + TX_AGENT_ID + ':' + id; }
  function loadEdit(id) { try { return localStorage.getItem(ekey(id)); } catch(e) { return null; } }
  function saveEditLS(id, txt) { try { localStorage.setItem(ekey(id), txt); return true; } catch(e) { return false; } }
  function clearEditLS(id) { try { localStorage.removeItem(ekey(id)); } catch(e) {} }
  function hasEdit(id) { return loadEdit(id) !== null; }

  function fmtDate(ts) {
    if (!ts) return '';
    var d = new Date(ts < 2e10 ? ts * 1000 : ts);
    return d.toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  }

  function fmtTranscript(tr) {
    if (!Array.isArray(tr)) return '';
    return tr.map(function(t) {
      return '[' + (t.role === 'agent' ? TX_AGENT_NAME : 'You') + ']\n' + (t.message || '');
    }).join('\n\n');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openOverlay() {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden','false');
    showList();
  }

  function closeOverlay() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden','true');
    currentConv = null; editMode = false; showOrig = false;
    editBar.hidden = true;
  }

  async function showList() {
    txTitle.textContent = 'Conversation History';
    backBtn.hidden = true;
    editBar.hidden = true;
    currentConv = null; editMode = false;
    txBody.innerHTML = '<div class="tx-loading">Loading…</div>';

    var data;
    try {
      var r = await fetch(PROXY + '?action=list&agent_id=' + encodeURIComponent(TX_AGENT_ID));
      data = await r.json();
    } catch(e) {
      txBody.innerHTML = '<div class="tx-empty">Could not load conversations.<br><small>' + escHtml(e.message) + '</small></div>';
      return;
    }

    var convs = data.conversations || [];
    if (!convs.length) {
      txBody.innerHTML = '<div class="tx-empty">No conversations yet.</div>';
      return;
    }

    txBody.innerHTML = '';
    convs.forEach(function(conv) {
      var div = document.createElement('div');
      div.className = 'tx-conv-item';
      var turns = (conv.transcript && conv.transcript.length) || (conv.metadata && conv.metadata.turn_count) || '?';
      var dur = conv.call_duration_secs ? Math.round(conv.call_duration_secs) + 's' : '';
      var edited = hasEdit(conv.conversation_id) ? '<span class="tx-edited-badge">edited</span>' : '';
      div.innerHTML = '<div class="tx-conv-date">' + escHtml(fmtDate(conv.start_time)) + edited + '</div>'
        + '<div class="tx-conv-meta">' + turns + ' turns' + (dur ? ' \xb7 ' + dur : '') + '</div>';
      div.addEventListener('click', function() { showConv(conv.conversation_id); });
      txBody.appendChild(div);
    });
  }

  async function showConv(convId) {
    txTitle.textContent = 'Transcript';
    backBtn.hidden = false;
    editBar.hidden = false;
    editMode = false; showOrig = false;
    txBody.innerHTML = '<div class="tx-loading">Loading transcript…</div>';

    var data;
    try {
      var r = await fetch(PROXY + '?action=get&conversation_id=' + encodeURIComponent(convId));
      data = await r.json();
    } catch(e) {
      txBody.innerHTML = '<div class="tx-empty">Could not load transcript.<br><small>' + escHtml(e.message) + '</small></div>';
      return;
    }

    currentConv = { id: convId, data: data };
    renderTx();
    updateBar();
  }

  function renderTx() {
    if (!currentConv) return;
    var id = currentConv.id;
    var transcript = currentConv.data.transcript || [];
    var editText = loadEdit(id);

    if (editMode) {
      txBody.innerHTML = '<div class="tx-ta-wrap"><textarea class="tx-textarea" id="tx-textarea"></textarea></div>';
      document.getElementById('tx-textarea').value = (editText !== null ? editText : fmtTranscript(transcript));
      return;
    }

    if (!showOrig && editText !== null) {
      txBody.innerHTML = '';
      var div = document.createElement('div');
      div.className = 'tx-transcript';
      var pre = document.createElement('pre');
      pre.className = 'tx-turn-text';
      pre.style.paddingTop = '0.5rem';
      pre.textContent = editText;
      div.appendChild(pre);
      txBody.appendChild(div);
      return;
    }

    txBody.innerHTML = '';
    var wrap = document.createElement('div');
    wrap.className = 'tx-transcript';
    if (!transcript.length) {
      wrap.innerHTML = '<div class="tx-empty">No transcript available for this conversation.</div>';
    } else {
      transcript.forEach(function(turn) {
        var t = document.createElement('div');
        t.className = 'tx-turn';
        t.innerHTML = '<div class="tx-turn-role ' + escHtml(turn.role) + '">'
          + escHtml(turn.role === 'agent' ? TX_AGENT_NAME : 'You')
          + '</div><div class="tx-turn-text">' + escHtml(turn.message || '') + '</div>';
        wrap.appendChild(t);
      });
    }
    txBody.appendChild(wrap);
  }

  function updateBar() {
    if (!currentConv) return;
    var he = hasEdit(currentConv.id);
    if (editMode) {
      btnEdit.hidden = true; btnSave.hidden = false; btnCancel.hidden = false;
      btnOrig.hidden = true; btnDiscard.hidden = true;
    } else {
      btnEdit.hidden = false; btnSave.hidden = true; btnCancel.hidden = true;
      btnOrig.hidden = !he; btnDiscard.hidden = !he;
      btnOrig.textContent = showOrig ? 'Show edited' : 'Show original';
    }
    savedMsg.textContent = '';
  }

  document.getElementById('tx-trigger').addEventListener('click', openOverlay);
  document.getElementById('tx-close').addEventListener('click', closeOverlay);
  backBtn.addEventListener('click', showList);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay(); });

  btnEdit.addEventListener('click', function() {
    editMode = true; showOrig = false; renderTx(); updateBar();
    var ta = document.getElementById('tx-textarea'); if (ta) ta.focus();
  });

  btnSave.addEventListener('click', function() {
    var ta = document.getElementById('tx-textarea');
    if (!ta || !currentConv) return;
    var ok = saveEditLS(currentConv.id, ta.value);
    editMode = false; showOrig = false; renderTx(); updateBar();
    savedMsg.textContent = ok ? 'Saved' : 'Save failed';
    setTimeout(function() { savedMsg.textContent = ''; }, 2200);
  });

  btnCancel.addEventListener('click', function() { editMode = false; renderTx(); updateBar(); });

  btnOrig.addEventListener('click', function() { showOrig = !showOrig; renderTx(); updateBar(); });

  btnDiscard.addEventListener('click', function() {
    if (!currentConv) return;
    clearEditLS(currentConv.id); showOrig = false; renderTx(); updateBar();
  });
})();
</script>
</body>
</html>
