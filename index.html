<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cora — NBRPA Committee Thinking Partner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0d0b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e8e4de;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #f5f0e8;
    }
    .page-header .subtitle {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: #8a7f6e;
      letter-spacing: 0.02em;
    }

    /* ── Start screen ──────────────────────────────────── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    .btn-start {
      background: #c4a35a;
      color: #0f0d0b;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0.85em 3em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-start:hover { background: #d4b36a; }

    .hint {
      font-size: 0.8rem;
      color: #4a4035;
      text-align: center;
    }

    /* ── Conversation screen ───────────────────────────── */
    #conv-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .widget-wrap {
      width: 340px;
      height: 340px;
    }
    elevenlabs-convai {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- ── Start Screen ─────────────────────────────────── -->
  <div id="start-screen">
    <div class="page-header">
      <h1>Cora</h1>
      <p class="subtitle">NBRPA Member Services — Committee Thinking Partner</p>
    </div>

    <button class="btn-start" id="btn-start">Talk to Cora</button>
    <p class="hint">Allow microphone access when prompted.</p>
  </div>

  <!-- ── Conversation Screen ──────────────────────────── -->
  <div id="conv-screen">
    <div class="page-header">
      <h1>Cora</h1>
      <p class="subtitle">NBRPA Member Services — Committee Thinking Partner</p>
    </div>

    <div class="widget-wrap" id="widget-container"></div>
  </div>

  <script>
    const AGENT_ID = 'agent_2401ks53q6t8e2drt1h7va3f2c52';

    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('start-screen').style.display = 'none';

      const container = document.getElementById('widget-container');
      const widget = document.createElement('elevenlabs-convai');
      widget.setAttribute('agent-id', AGENT_ID);
      container.appendChild(widget);

      document.getElementById('conv-screen').style.display = 'flex';
    });
  </script>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
