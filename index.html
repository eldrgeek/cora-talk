<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill — NBRPA Committee Team</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0d0b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e8e4de;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #f5f0e8;
    }
    .page-header .subtitle {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: #8a7f6e;
      letter-spacing: 0.02em;
    }

    .panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 380px;
    }
    .panel.visible { display: flex; }

    /* Start button */
    .btn-start {
      background: #c4a35a;
      color: #0f0d0b;
      border: none;
      border-radius: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.9em 3.2em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-start:hover { background: #d4b36a; }
    .btn-start:active { transform: scale(0.97); }

    /* Connecting state */
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #3a3228;
      border-top-color: #c4a35a;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Active state - orb */
    .orb-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #d4b36a, #7a5a20);
      box-shadow: 0 0 0 0 rgba(196,163,90,0.4);
      transition: transform 0.2s;
    }
    .orb.speaking {
      animation: pulse 1.1s ease-in-out infinite;
    }
    .orb.listening {
      box-shadow: 0 0 0 8px rgba(196,163,90,0.15);
    }
    .orb.thinking {
      animation: think 2s ease-in-out infinite;
      opacity: 0.7;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,163,90,0.5); }
      50% { box-shadow: 0 0 0 20px rgba(196,163,90,0); }
    }
    @keyframes think {
      0%, 100% { opacity: 0.55; transform: scale(0.96); }
      50% { opacity: 0.85; transform: scale(1.03); }
    }

    .mode-label {
      font-size: 0.95rem;
      color: #8a7f6e;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .btn-end {
      background: transparent;
      color: #6a5f50;
      border: 1px solid #3a3228;
      border-radius: 8px;
      font-size: 0.9rem;
      padding: 0.6em 2em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 0.5rem;
    }
    .btn-end:hover { border-color: #8a7f6e; color: #c8bcaa; }

    /* Error state */
    .error-msg {
      color: #c06060;
      font-size: 0.9rem;
      text-align: center;
    }
    .btn-retry {
      background: #2a2520;
      color: #c8bcaa;
      border: 1px solid #3a3228;
      border-radius: 8px;
      font-size: 0.9rem;
      padding: 0.6em 2em;
      cursor: pointer;
    }
    .btn-retry:hover { background: #3a3228; }

    .hint {
      font-size: 0.78rem;
      color: #3a3228;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Bill</h1>
    <p class="subtitle">NBRPA Member Services — Committee Team</p>
  </div>

  <!-- Start state: one click to connect -->
  <div id="start-state" class="panel visible">
    <button class="btn-start" id="btn-start">Talk to Bill</button>
    <p class="hint">Microphone access required.</p>
  </div>

  <!-- Connecting state -->
  <div id="connecting-state" class="panel">
    <div class="spinner"></div>
    <p style="color:#6a5f50;font-size:0.9rem;letter-spacing:0.04em;">Connecting&hellip;</p>
  </div>

  <!-- Active conversation state -->
  <div id="active-state" class="panel">
    <div class="orb-wrap">
      <div class="orb" id="orb"></div>
    </div>
    <span class="mode-label" id="mode-label">Connected</span>
    <button class="btn-end" id="btn-end">End Conversation</button>
  </div>

  <!-- Error state -->
  <div id="error-state" class="panel">
    <p class="error-msg" id="error-msg">Something went wrong.</p>
    <button class="btn-retry" id="btn-retry">Try Again</button>
  </div>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@elevenlabs/client@latest';

    const AGENT_ID = 'agent_2401ks53q6t8e2drt1h7va3f2c52';

    let conversation = null;

    function show(id) {
      const ids = ['start-state', 'connecting-state', 'active-state', 'error-state'];
      ids.forEach(sid => {
        document.getElementById(sid).classList.toggle('visible', sid === id);
      });
    }

    async function startConversation() {
      show('connecting-state');

      try {
        conversation = await Conversation.startSession({
          agentId: AGENT_ID,
          onConnect: () => show('active-state'),
          onDisconnect: () => { conversation = null; show('start-state'); },
          onError: (err) => {
            document.getElementById('error-msg').textContent = String(err);
            conversation = null;
            show('error-state');
          },
          onModeChange: ({ mode }) => {
            const orb = document.getElementById('orb');
            const label = document.getElementById('mode-label');
            if (mode === 'speaking') {
              orb.className = 'orb speaking';
              label.textContent = 'Bill is speaking';
            } else if (mode === 'thinking' || mode === 'processing') {
              orb.className = 'orb thinking';
              label.textContent = 'Thinking…';
            } else {
              orb.className = 'orb listening';
              label.textContent = 'Listening';
            }
          },
        });
      } catch (err) {
        document.getElementById('error-msg').textContent = String(err);
        conversation = null;
        show('error-state');
      }
    }

    async function endConversation() {
      if (conversation) {
        try { await conversation.endSession(); } catch (_) {}
        conversation = null;
      }
      show('start-state');
    }

    document.getElementById('btn-start').addEventListener('click', startConversation);
    document.getElementById('btn-end').addEventListener('click', endConversation);
    document.getElementById('btn-retry').addEventListener('click', startConversation);

  </script>
</body>
</html>
